name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: pahe-cli
            name: pahe-cli-linux-gnu

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin: pahe-cli
            name: pahe-cli-linux-musl

          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            bin: pahe-cli.exe
            name: pahe-cli-windows-gnu.exe

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: pahe-cli.exe
            name: pahe-cli-windows-msvc.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            bin: pahe-cli
            name: pahe-cli-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            bin: pahe-cli
            name: pahe-cli-macos-aarch64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross toolchains
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mingw-w64

      - uses: Swatinem/rust-cache@v2

      - name: Check
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo check --workspace --all-targets

      - name: Build
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Stage
        shell: bash
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/${{ matrix.name }}

      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    needs: binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Detect prerelease
        id: prerelease
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value }}
          files: dist/*

  docker:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/pahe-cli
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
